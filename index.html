<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.37/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <main>
        <label for="countries">Select a city to view its current time.</label>

        <select name="country" id="countries">
          <option value="select">Select a city...</option>
           <option value="nyc">New York🗽</option>
          <option value="Paris">Paris🇫🇷</option>
           <option value="Sydney">Sydney🇦🇺</option>
           <option value="Tokyo">Tokyo🇯🇵</option>
        </select>

        <div class="city">
            <h2>San Francisco🌉</h2> 
            <div class="date">March 16th 2026</div>
            <div class="time">1:16 PM</div>
        </div>


        <div class="city">
            <h2>London 🇬🇧</h2> 
            <div class="date">March 16th 2026</div>
            <div class="time">8:16 PM</div>
        </div>


        <div class="city">
            <h2>Seoul🇰🇷</h2> 
            <div class="date">March 17th 2026</div>
            <div class="time">5:16 AM</div>
        </div>

      </main>

      <footer>
        This project was coded by Kelly Lançon, is open-sourced on
        <a href="https://github.com/klanc0403" target="_blank">GitHub</a>, and
        hosted on
        <a href="https://world-clock-ksl.netlify.app/" target="_blank">Netlify</a>.
      </footer>
    </div>

    <script src="src/index.js"></script>
  </body>
</html>
