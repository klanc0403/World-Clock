<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <main>
        <label for="countries">Select a city to view its current time.</label>
      <select name="country" id="countries">
        <option value="select">Select a country...</option>
         <option value="Beijing">Beijing</option>
        <option value="New York">New York</option>
        <option value="Paris">Paris</option>
        <option value="San Francisco">San Francisco</option>
        <option value="Sydney">Sydney</option>


      </main>

      <footer>
        This project was coded by Kelly Lançon, is open-sourced on
        <a href="https://github.com/klanc0403" target="_blank">GitHub</a>, and
        hosted on
        <a href="https://world-clock-ksl.netlify.app/" target="_blank">Netlify</a>.
      </footer>
    </div>

    <script src="src/index.js"></script>
  </body>
</html>
